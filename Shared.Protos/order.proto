syntax = "proto3";

option csharp_namespace = "OrderService";

package order;

service Order {
  rpc PlaceOrder (PlaceOrderRequest) returns (PlaceOrderReply);
}

message PlaceOrderRequest {
  int32 item_id = 1;
  int32 quantity = 2;
}

message PlaceOrderReply {
  bool success = 1;
  string message = 2;
}
